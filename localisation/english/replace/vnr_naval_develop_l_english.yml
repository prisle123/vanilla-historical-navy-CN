l_english:
 naval_develop_category: "海军发展计划"
 gen_naval_hire_designer: "雇佣外国舰船设计师"
 gen_naval_hire_designer_desc: "我们的海军规模仍然很小，通过雇佣一批外国海军设计师将会为我们的造船工业打下扎实的基础。"
 gen_naval_hire_advisor: "雇佣外国海军顾问"
 gen_naval_hire_advisor_desc: "我们的海军规模仍然很小，通过雇佣一批外国海军顾问将会为我们未来的海军人才储备打下扎实的基础。"
 gen_naval_develop_destroyer: "购买驱逐舰蓝图"
 gen_naval_develop_destroyer_desc: "驱逐舰是海军的基石，我们应该向国外购买一些蓝图资料以赶上世界先进水平。"
 gen_naval_develop_cruiser: "购买巡洋舰蓝图"
 gen_naval_develop_cruiser_desc: "巡洋舰是海军中的多面手，我们应该向国外购买一些蓝图资料以赶上世界先进水平。"
 gen_naval_develop_battleship: "购买战列舰蓝图"
 gen_naval_develop_battleship_desc: "战列舰是海权的象征，我们应该向国外购买一些蓝图资料以赶上世界先进水平。"
 gen_naval_develop_carrier: "购买航空母舰蓝图"
 gen_naval_develop_carrier_desc: "航母已被证明是海战的未来，我们应该向国外购买一些蓝图资料以赶上世界先进水平。"
 gen_naval_develop_submarine: "购买潜艇蓝图"
 gen_naval_develop_submarine_desc: "潜艇是水下的杀手，我们应该向国外购买一些蓝图资料以赶上世界先进水平。"
 gen_naval_research_budget: "增加海军科研经费"
 gen_naval_research_budget_desc: "我们需要为海军技术的发展投入更多的资金。"
 vnr_research_budget: "海军科研经费"
 etajima_naval_academy: "江田岛海军兵学校"
 etajima_naval_academy_desc: "1866年，日本帝国海军兵学校正式在长崎成立，并在1888年将校址迁往江田岛。日本海军兵学校是世界上最富盛名的海军军官培养单位院校之一，每年为日本海军输送着数以百计拥有丰富经验的海军军官。"
 annapolis_naval_academy: "安纳波利斯海军学院"
 annapolis_naval_academy_desc: "美国海军学院坐落于马里兰州的安纳波利斯市，有着悠久的建校历史。该学院立足于海权理论，专注于通过海军战术和技术的教育培养拥有战略视野的学员。"
 panama_standard: "巴拿马标准"
 panama_standard_desc: "为了同时在太平洋和大西洋维持存在，美国海军极度依赖通过巴拿马运河在两大洋间进行舰队机动。由于运河特殊的地理和水文条件，一艘船通过船闸的最大宽度不能超过110英尺，这一标准与美国的战列舰设计深度绑定。"
 kiel_standard: "基尔标准"
 kiel_standard_desc: "作为绕过大贝尔特海峡的捷径，基尔运河是德意志重要的生命线。由于运河对过往船舶的吃水深度有着严格的限制，德国战列舰必须通过加宽舰体来达到增加浮力、减小吃水的效果，而这往往伴随着额外装甲和超重舰体等后果。"
 professional_damage_control: "专业损管队伍"
 professional_damage_control_desc: "一支训练有素的损管队伍可以在最危险的时刻拯救一船人的生命。"
 advanced_supply_fleet: "成熟的补给船队"
 advanced_supply_fleet_desc: "一支由舰队油船和辅助船组成的成熟的补给船队可以保证舰队满状态运转。"
 underwater_death: "潜艇战"
 underwater_death_desc: "尽管仍未被广泛接受，潜艇确实具备在战时瘫痪一个国家的贸易和经济的潜力。"
 efficient_escort: "高效护航编队"
 efficient_escort_desc: "我们需要优秀的驱逐舰和护卫舰来保卫舰队和商船队。"
 merchant_fleet: "贸易舰队"
 merchant_fleet_desc: "舰船是武器，但也可以用作和平与贸易的使者。"
 inflexible_headquarter: "墨守成规的指挥部"
 inflexible_headquarter_desc: "我们的海军司令部充斥着沉迷于过去战争理论和战术理念的老古董。"
 win_or_die: "孤注一掷"
 win_or_die_desc: "今天，我们背水一战！"
 recovering_from_naval_race: "从海军军备竞赛中恢复"
 recovering_from_naval_race_desc: "我们的海军正在从一场难以负担的海军军备竞赛中恢复过来，它的存在深刻地影响了海军的建造计划和舰船设计。"
 dartmouth_naval_academy: "不列颠尼亚海军学院"
 dartmouth_naval_academy_desc: "位于达特茅斯的不列颠尼亚海军学院的历史和英国的海军一样悠久，并已经成为了英国武装力量的代表之一。"
 recovering_from_naval_race_tt: "仅在KR/KX海军重置中可用。"
 wartime_convoy_conversion: "商船航母改装"
 wartime_convoy_conversion_desc: "海军可以向私营企业购买一艘商船并将其改装为航空母舰。"
 wartime_carrier_conversion_tt_1: "§G一艘航母将在两个月内改装完成。§!\n\n§Y完成商船航母研究。§!\n"
 wartime_liner_conversion: "护航航母改装"
 wartime_liner_conversion_desc: "海军可以向私营企业购买一艘远洋客轮并将其改装为航空母舰。"
 wartime_carrier_conversion_tt_2: "§G一艘航母将在三个月内改装完成。§!\n\n§Y完成护航航母研究。§!\n"
 sp_battlecarrier: "航空战列舰"
 sp_battlecarrier_desc: "航空战列舰是一种兼具战列舰和航空母舰特点的混合型军舰。在多个重视两种船舶类型的国家中都有相关的海军专家提出过这种构想。"
 sp_subcarrier: "潜水航母"
 sp_subcarrier_desc: "潜水航母事实上是一种能够弹射飞机的大型潜艇。虽然其装载的飞机更小更轻，但是在潜艇狭小的空间内仍然很难容纳飞机，因此它们的载机量通常只有二到三架。"
 sp_nuclear_torpedo: "核鱼雷"
 sp_nuclear_torpedo_desc: "水下核爆炸对水面舰艇和潜艇都是极为致命的。通过加装微型核弹头，这种鱼雷将成为潜艇上最强大的武器。"
 sp_super_heavy_guns: "超大口径舰炮"
 sp_super_heavy_guns_desc: "超大口径舰炮是一种口径达到甚至超过18寸（约460mm）的重型火炮。"
 sp_mega_carrier: "战略打击航母"
 sp_mega_carrier_desc: "战略打击航母是浮动机场的真正定义，拥有可以从远距离放飞重型喷气机的能力。"
 sp_arsenal_ship: "武库舰"
 sp_arsenal_ship_desc: "随着对导弹在未来可以改变战争模式的认可，支持者们的目光转向了携带数百枚导弹的武库舰。"
 sp_battlecarrier_unique_reward_a: "对航空战列舰角色的争议"
 sp_battlecarrier_unique_reward_a_desc: "在航空战列舰的设计迭代过程中，一个问题油然而生。我们应该注重于提升单舰的性能还是试图将其纳入到舰队的作战指挥体系中？"
 sp_battlecarrier_perference_a: "注重性能"
 sp_battlecarrier_perference_b: "注重协同"
 sp_subcarrier_unique_reward_a: "工程经验的应用"
 sp_subcarrier_unique_reward_a_desc: "在潜水航母的设计过程中，一个问题油然而生。我们应该将工程中获得的经验用于加强巡洋潜艇还是所有的潜艇？"
 sp_subcarrier_perference_a: "巡洋潜艇"
 sp_subcarrier_perference_b: "所有潜艇"
 sp_nuclear_torpedo_unique_reward_a: "核鱼雷项目的重心"
 sp_nuclear_torpedo_unique_reward_a_desc: "在潜艇上储存核战斗部的安全性仍然有待商榷。"
 sp_nuclear_torpedo_preference_a: "安全第一"
 sp_nuclear_torpedo_preference_b: "扩大储备"
 sp_super_heavy_guns_unique_reward_a: "对20英寸主炮的追求"
 sp_super_heavy_guns_unique_reward_a_desc: "在超重型舰炮的设计选型中，研发团队提出了一个建造更大口径舰炮的疯狂计划。如果我们选择在这方面寻求突破，那势必会影响目前的设计进程。"
 sp_super_heavy_guns_preference_a: "同意"
 sp_super_heavy_guns_preference_b: "算了"
 super_heavy_carrier_conversion: "敲定超重型航母改装方案"
 super_heavy_carrier_conversion_desc: "随着至少一艘超重型战列舰加入现役，海军设计团队提出可以尝试将其充足的空间作为新航母的平台。"
 sp_early_informatization_system: "早期信息化系统"
 sp_early_informatization_system_desc: "与过去的海战不同，未来海战的形式已经展现出对事态感知和数据处理的依赖，这一趋势的发展速度远超人类的理解，而信息化就是未来几十年中确保胜利的基石。"
 sp_early_informatization_system_unique_reward_a: "信息化努力"
 sp_early_informatization_system_unique_reward_a_desc: "在计算机科技领域处于领导地位的研发团队提出了一项旨在扩展信息化系统，以及合并所有海军舰船上电子设备的集成化计算机系统。这是一个有趣的点子，但也会在很大程度上影响目前的项目进度。"
 sp_early_informatization_system_perference_a: "慢慢来。"
 sp_early_informatization_system_perference_b: "分出一部分预算。"
 murwik_naval_academy: "缪尔维克海军学院"
 murwik_naval_academy_desc: "缪尔维克海军学院是德国海军军官的主要训练培养机构，其在1910年基尔海军学院解散重组后设立，成为德国最重要的海军院校。该机构致力于通过海军火器训练和工程学教育培养职业化的德国海军军官。"
 sp_high_speed_light_engine: "高速轻型引擎"
 sp_high_speed_light_engine_desc: "高温过热器和强劲的蒸汽涡轮的结合可以将舰船加速到前所未有的速度。"
 theoretic_breakthrough_1: "理论突破 I"
 theoretic_breakthrough_1_desc: "海军的理论革命正在影响这位海军上将。"
 theoretic_breakthrough_2: "理论突破 II"
 theoretic_breakthrough_2_desc: "海军的理论革命正在影响这位海军上将。"
 lack_maintenance_facilities: "缺乏维护"
 lack_maintenance_facilities_desc: "我们拥有的海军设施无力维护现有的舰队。"
 voroshilov_naval_academy: "克利缅特·伏罗希洛夫海军学院"
 voroshilov_naval_academy_desc: "作为世界上最富盛名的海军军官培训院校之一，这所学院在二月革命的烽火中脱胎于尼古拉耶夫学院而组建。每年，数百名经验丰富的学员从这里毕业并踏上仕途，渴望着为俄罗斯母亲献身。"
 nakhimov_naval_academy: "纳希莫夫海军学院"
 nakhimov_naval_academy_desc: "作为世界上最富盛名的海军军官培训院校之一，这所学院在二月革命的烽火中脱胎于尼古拉耶夫学院而组建。每年，数百名经验丰富的学员从这里毕业并踏上仕途，渴望着为俄罗斯母亲献身。"
 usn_fighter_weapons_school: "TOPGUN"
 usn_fighter_weapons_school_desc: "美国海军战斗机武器学校（俗称“TOPGUN”），是一项旨在为海军飞行员提供空战训练的教学课程，其目的不是为了基础训练而是培训经验丰富的航空教官。该学校通过空气动力学和战术技巧的相关课程，以及对精英主义的重视，意在将学员培养成最顶尖的飞行员。"
 sp_submarine_snorkel: "潜艇通气管"
 sp_submarine_snorkel_desc: "潜艇通气管是一种在潜艇潜航状态下伸出水面的装置，可以让潜艇发动机在水下仍然吸入空气并正常运转。"
 sp_shipping_container: "集装箱"
 sp_shipping_container_desc: "有着标准尺寸的金属箱式容器，可以使用船舶或路上载具运输，在军用和民用领域都极大提升了物流效率。"
 sp_naval_proximity_fuze_unique_reward_a: "近炸引信的使用场景"
 sp_naval_proximity_fuze_unique_reward_a_desc: "近炸引信使防空炮弹的命中率直线上升，但也带了生产成本的激增。我们可以将这种炮弹的配额集中分配给舰队中专用的防空舰，或者直面高昂的成本，让这项技术优势广泛地应用到所有舰船上。"
 sp_naval_proximity_fuze_preference_a: "防空舰船优先"
 sp_naval_proximity_fuze_preference_b: "全局优势"