 RULE_AI_SHIP_DESIGN_STYLE: "AI舰船设计风格"
 RULE_OPTION_HISTORICAL: "史实"
 RULE_OPTION_EXPERT: "专家"
 RULE_AI_SHIP_DESIGN_STYLE_HISTORICAL_DESC: "AI会依照史实方案，以符合现实的模块方案设计舰船。\n\n§C这是过去海军重置一直采用的默认设计方法。§!"
 RULE_AI_SHIP_DESIGN_STYLE_EXPERT_DESC: "AI会基于效率至上的目标设计和建造最优的模板。\n\n这个选项会让海战§R更加有挑战性§!，但是也意味着§R角色扮演的元素将会大幅减少§!。§Y推荐想要更高挑战性的玩家使用。§!"
 buff_ai_production: "AI生产加强"
 buff_ai_production_desc: "这也太简单了。"
 vnr_ai.1.t: "选择海军AI生产强度"
 vnr_ai.1.d: "生产强度决议可以在原版的基础上增强AI的船坞产能。你可以选择三种不同的难度，它们分别是普通、困难和疯狂。在默认情况下，你将处于简单难度，AI的产能水平和原版相比没有不同。\n\n目前的难度：[get_vnr_ai_production]"
 vnr_ai_production_no: "§G简单§!"
 vnr_ai_production_normal: "§G普通§!"
 vnr_ai_production_hard: "§O困难§!"
 vnr_ai_production_mad: "§R疯狂§!"
 vnr_ai.1.0: "疯狂"
 vnr_ai.1.1: "困难"
 vnr_ai.1.2: "普通"
 vnr_ai.1.3: "简单"
 vnr_mad_production: "AI生产加强：§R疯狂§!"
 vnr_hard_production: "AI生产加强：§O困难§!"
 vnr_normal_production: "AI生产加强：§G普通§!"
 RULE_ALLOW_AI_TECH_AUTO_UNLOCK: "允许AI自动解锁科技"
 RULE_ALLOW_AI_TECH_AUTO_UNLOCK_FREE_DESC: "§G开启§!AI在游戏中自动解锁海军科技。\n\n此选项包含了§RAI作弊§!，在玩家选择§C使用正常或作弊手段提前研究某些海军科技§!时，AI将也会§Y提前解锁部分科技§!（仅当提前量超过6个月时启用）。"
 RULE_ALLOW_AI_TECH_AUTO_UNLOCK_BLOCKED_DESC: "§R关闭§!AI在游戏中自动解锁海军科技。\n\n这个选项将会§Y改变§!AI选择科技的行为，使其以§Y更加平衡的倾向§!进行科研，但是在海军科技的研究速度上会§R落后于§!§C专注投入海军§!的玩家，并且可能§R影响其他方面的科研§!。"
 RULE_SHIPYARD_OUTPUT_BOOST_BLOCKED_DESC: "船厂的产出为2.5点IC/日，与原版一致。"
 vnr_shipyard_output_boost: "海军重置船厂产出加成"
 join_tactical_data_link: "接入[ROOT.GetFactionName]海军战术数据链"
 join_tactical_data_link_desc: "一套联合战术数据链系统已经由我们阵营当中的领先成员部署成功。虽然这是一个加强我军与盟友协同作战能力的好机会，但是我们仍然可以独立开发一套自己的数据链系统。\n§C如果我们选择接入友方数据链，我们将不能研发自己的版本，但会立刻解锁以下加成：§!\n§Y海军协同性：§!§G+10%§!\n§Y海军组织度：§!§G+7.5%§!\n§Y可见度：§!§G-7.5%§!"
 RULE_AI_NAVAL_MANAGEMENT: "使用海军重置海军管理AI"
 RULE_AI_NAVAL_MANAGEMENT_FREE_DESC: "在原版环境中§G启动§!海军舰队管理AI。\n\n此选项专为§Y历史模式§!设计，可以模拟历史上比较著名的海军战略例如§C无限制潜艇战§!或§C跳岛战术§!，使AI大国在§C史实的二战场景§!中表现得更加§Y真实和强大§!。\n\n§R此选项在以下场景中不推荐使用：§!\n£white_dot 架空历史模组（即使有兼容包）\n£white_dot 修改海域地块的模组\n£white_dot 非默认的二战场景（随机路线/非历史，任何偏离轴心对同盟的情况）"
 RULE_AI_NAVAL_MANAGEMENT_BLOCKED_DESC: "在原版环境中§R关闭§!海军舰队管理AI。\n\n§Y使用原版或其他处于激活状态模组提供的海军AI。§!"
 RULE_SHIPYARD_OUTPUT_BOOST_PLAYER: "玩家船厂产出加成"
 RULE_SHIPYARD_OUTPUT_BOOST_AI: "AI船厂产出加成"
 RULE_OPTION_BUFF_60: "增加全满"
 RULE_OPTION_BUFF_30: "增加一半"
 RULE_SHIPYARD_OUTPUT_BOOST_BUFF_60_DESC: "船厂的产出为4点IC/日，比原版§G快60%§!。"
 RULE_SHIPYARD_OUTPUT_BOOST_BUFF_30_DESC: "船厂的产出为3.25点IC/日，比原版§G快30%§!。"
 RULE_AI_AIR_DESIGN: "启用AI改进舰载机设计"
 RULE_AI_AIR_DESIGN_FREE_DESC: "为AI§G启用§!改进过的舰载机设计模板。\n\n§R此选项不推荐与修改空军科技或飞机设计器的模组混用。§!"
 RULE_AI_AIR_DESIGN_BLOCKED_DESC: "为AI§R关闭§!改进过的舰载机设计模板。\n\n§Y使用原版或其他激活状态模组提供的飞机模板。§!"
 vnr_cv_plane_output_boost: "海军重置舰载机产出加成"
 enable_ai_ship_design: "AI舰船设计风格"
 enable_ai_plane_design: "AI舰载机设计风格"
 vnr_ai.2.t: "AI舰船设计风格"
 vnr_ai.2.d: "§R虽然目前推荐的方式是在开局的规则设置中开启专家AI设计§!，但是为了以防你错过这一特性，你仍然可以在局中使用该决议开启专家设计。为了使AI可以快速从史实模板切换到专家模板，所有的AI大国将会立刻获得部分海军经验。"
 vnr_ai.2.1: "§R切换到专家设计§!"
 vnr_ai.2.2: "§G切换到史实设计§!"
 vnr_ai.3.t: "AI舰载机设计风格"
 vnr_ai.3.d: "§R虽然目前推荐的方式是在开局的规则设置中开启专家AI设计§!，但是为了以防你错过这一特性，你仍然可以在局中使用该决议开启专家设计。为了使AI可以快速从史实模板切换到专家模板，所有的AI大国将会立刻获得部分空军经验。\n\n§R请注意，该选项不能与修改过飞机科技和模块的模组一起使用。如果你开启了这类模组，请勿进行模板切换。§!"
 vnr_ai.3.1: "§R切换到专家设计§!"
 vnr_ai.3.2: "§G切换到原版设计§!"
 RULE_ENG_EXPERT_NAVY: "@ENG 专家皇家海军"
 RULE_USA_EXPERT_NAVY: "@USA 专家美国海军"
 RULE_JAP_EXPERT_NAVY: "@JAP 专家日本帝国海军"
 RULE_AI_EXPERT_NAVY_BLOCKED_DESC: "此国家开局的舰队不会被替换。"
 RULE_AI_EXPERT_NAVY_FREE_DESC: "此国家开局的舰队全部替换为专家设计。\n\n此选项仅在§YAI舰船设计风格§!设置为§C专家§!且该国家为§RAI控制§!时方可生效。"